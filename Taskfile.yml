version: "3"

tasks:
  install:
    desc: Install the latex package locally
    cmds:
      - l3build install

  extract-dtx-docs:
    desc: Extract and convert DTX documentation to Markdown
    cmds:
      - texlua scripts/extract-dtx-docs.lua

  docs:
    desc: Build the documentation site (Quarto)
    dir: docs
    deps:
      - extract-dtx-docs
    cmds:
      - quarto render

  docs-preview:
    desc: Preview the generated documentation in a web browser
    dir: docs
    cmds:
      - quarto preview

  build-manual:
    desc: Build the PDF manual
    deps:
      - extract-dtx-docs
      - generate-example-images
    cmds:
      - cd docs && quarto render --to pdf

  test:
    desc: Run the test suite, checking package functionality
    cmds:
      - task test-lua
      - task test-pdf
      - l3build-wrapped check

  test-lua:
    desc: Run pure Lua unit tests
    cmds:
      - texlua tests/lua/run.lua
      - texlua tests/lua/parsing.lua
      - texlua tests/lua/validation.lua
      - texlua tests/lua/color-math.lua
      - texlua tests/lua/pdf-stream.lua
      - texlua tests/lua/shading-macros.lua
      - texlua tests/lua/imagemagick.lua

  test-pdf:
    desc: End-to-end test that CVD transforms colour operators in embedded PDF images
    cmds:
      - l3build-wrapped unpack -q
      - bash tests/pdf/check.sh

  ctan:
    desc: Prepare the package for CTAN submission
    deps:
      - build-manual
    cmds:
      - l3build-wrapped ctan

  logo:
    desc: Build logo in multiple formats (PDF, PNG, SVG)
    dir: images
    cmds:
      - lualatex logo.tex
      - pdftocairo -png -singlefile -r 600 -transp logo.pdf logo
    sources:
      - images/logo.tex
    generates:
      - images/logo.pdf
      - images/logo.png
      - images/logo.svg

  opengraph:
    desc: Build OpenGraph image (1200x630 PNG)
    deps:
      - logo
    dir: images
    cmds:
      - lualatex og.tex
      - pdftocairo -png -singlefile -r 150 og.pdf og
    sources:
      - images/og.tex
    generates:
      - images/og.pdf
      - images/og.png
